<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BEST MA IN THE WORLD</title>

  <!-- Enable standalone (app-like) mode on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MA Phone">

  <!-- Icons for iOS and manifest for other platforms -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">

  <!-- Theme colors -->
  <meta name="theme-color" content="#8CCFAF">
  <meta name="background-color" content="#FFFFFF">

  <style>
    :root {
      /* Pastel colours for each contact */
      --adam-color: #A5D6A7;      /* soft green */
      --chlo-color: #F8BBD0;     /* soft pink */
      --mimi-color: #CE93D8;      /* soft purple */
      --oli-color: #90CAF9;       /* soft blue */
      --emergency-color: #EF5350; /* bright red */
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                   Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }
    a.button {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #FFFFFF;
      font-size: 1.4em;
      border-radius: 12px;
      padding: 20px;
      height: 80px;
      transition: opacity 0.2s ease;
    }
    a.button:active {
      opacity: 0.7;
    }
    /* Individual button colours */
    #adam { background: var(--adam-color); }
    #chloe { background: var(--chlo-color); }
    #mimi { background: var(--mimi-color); }
    #oli { background: var(--oli-color); }
    /* Emergency button styling */
    #emergency {
      background: var(--emergency-color);
      position: fixed;
      bottom: 20px;
      right: 20px;
      left: 20px;
      max-width: 280px;
      margin: 0 auto;
      width: calc(100% - 40px);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Replace +61000000000 with the actual phone numbers when deploying -->
    <a href="tel:+61400782204" id="adam" class="button">CALL ADAM</a>
    <a href="tel:+61404384862" id="chloe" class="button">CALL CHLO</a>
    <a href="tel:+61452405051" id="mimi" class="button">CALL MIMI</a>
    <a href="tel:+61406004604" id="oli" class="button">CALL OLI</a>
  </div>
  <a href="tel:000" id="emergency" class="button">EMERGENCY 000</a>
</body>
</html>
